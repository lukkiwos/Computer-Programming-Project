<!DOCTYPE html>
<html>
<head>
    <title>Moje gry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container py-4">

    <h1 class="mb-4">📚 Moje gry</h1>

    <a href="/" class="btn btn-outline-light mb-3">⬅️ Wróć</a>

    <!-- 🔍 FILTER -->
    <form method="GET" class="row g-2 mb-4">
        <div class="col-md-4">
            <input type="text" name="search" class="form-control"
                   placeholder="Szukaj..."
                   value="{{ request.args.get('search','') }}">
        </div>

        <div class="col-md-3">
            <select name="sort" class="form-select">
                <option value="rating">Rating</option>
                <option value="name">Nazwa</option>
                <option value="date">Data</option>
            </select>
        </div>

        <div class="col-md-2">
            <select name="order" class="form-select">
                <option value="desc">↓</option>
                <option value="asc">↑</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-danger w-100">Zastosuj</button>
        </div>
    </form>

    <div class="row">
        {% for game in games %}
        <div class="col-md-4 mb-4">
            <div class="card bg-secondary text-light h-100">

                <div class="card-body">
                    <h5>{{ game.name }}</h5>

                    {% if game.rating %}
                        <p>⭐ {{ game.rating|round(1) }}</p>
                    {% endif %}

                    {% if game.release_date %}
                        <p>📅 {{ game.release_date }}</p>
                    {% endif %}

                    <form action="/delete-game/{{ game.id }}" method="POST">
                        <button class="btn btn-danger w-100">❌ Usuń</button>
                    </form>

                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
